agent:
  personality: archivist
  max_turns: 40
  tool_use_enforcement: strict
model:
  provider: custom
  model: mistral-large-3:675b
  base_url: https://ollama.com/v1
  api_key: ${OLLAMA_API_KEY}
  fallback_models:
  - kimi-k2.5
  - deepseek-v4-flash
  temperature: 0.7
terminal:
  backend: local
  timeout: 180
  cwd: null
toolsets:
  enabled:
  - terminal
  - file
  - todo
  - clarify
  disabled:
  - browser
  - web
  - vision
  - tts
security:
  yolo_bypass: false
  website_blocklist: []
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.25
memory:
  memory_enabled: true
  user_profile_enabled: true
display:
  skin: default
  tool_progress: true
  show_reasoning: false
  show_cost: false
