_config_version: 22
model:
  default: kimi-k2.5
  provider: custom
  base_url: https://ollama.com/v1
  api_key: ${OLLAMA_API_KEY}

auxiliary:
  approval:
    api_key: ${OLLAMA_API_KEY}
    base_url: https://ollama.com/v1
    model: deepseek-v4-flash
    provider: custom
    timeout: 30
  vision:
    api_key: ${OLLAMA_API_KEY}
    base_url: https://ollama.com/v1
    model: kimi-k2.6
    provider: custom
    timeout: 120

toolsets:
- hermes-cli
- web
- file

agent:
  max_turns: 90
  api_max_retries: 3

approvals:
  mode: auto
  cron_mode: auto
  timeout: 60
